<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>宇宙垃圾桶 | Cosmic Trash Bin</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #05050a;
            color: #fff;
            font-family: 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            perspective: 2000px;
        }

        body::before {
            content: '';
            position: absolute; width: 100%; height: 100%;
            background-image: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px);
            background-size: 550px 550px; opacity: 0.15; z-index: 0;
        }

        .shake-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100%;
            padding-top: 160px;
            transition: all 0.3s;
        }

        @media (max-width: 600px) {
            .shake-wrapper { padding-top: 135px !important; }
            h1 { font-size: 1.4rem !important; }
            h1 small { font-size: 0.7rem !important; }
            .stats-panel { top: 10px !important; transform: scale(0.85) !important; }
            .black-hole-stage { height: 250px !important; }
            
            /* ✨ 修正手機版佈局：將橫排改為直排 */
            .btn-row { 
                flex-direction: column !important; 
                gap: 15px !important; 
            }
            .boom-trigger-btn { 
                position: static !important; /* 解除絕對定位，讓它在下方顯示 */
                transform: none !important;
            }
        }

        .stats-panel {
            position: absolute;
            top: 25px;
            display: flex;
            gap: 20px;
            background: rgba(255, 255, 255, 0.05);
            padding: 12px 25px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .stat-item { text-align: center; font-size: 0.75rem; color: #888; }
        .stat-item .cn-label { display: block; color: #aaa; font-size: 0.9rem; margin-bottom: 2px; }
        .stat-item span { display: block; font-size: 1.4rem; font-weight: bold; color: #a251f1; text-shadow: 0 0 10px rgba(162, 81, 241, 0.5); }

        .container {
            position: relative;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 600px;
            padding: 0 20px;
        }

        h1 { font-size: 1.8rem; text-align: center; text-shadow: 0 0 15px rgba(255,255,255,0.7); line-height: 1.3; }
        h1 small { display: block; font-size: 1rem; color: rgba(255, 255, 255, 0.3); margin-top: 8px; text-transform: uppercase; letter-spacing: 2px; }

        .input-group { 
            display: flex; 
            flex-direction: column; 
            width: 100%; 
            gap: 20px; 
            align-items: center; 
        }

        input[type="text"] {
            width: 100%; max-width: 500px; padding: 15px 25px; border-radius: 35px;
            border: 1px solid #444; background: rgba(0, 0, 0, 0.6);
            color: white; font-size: 1.1rem; outline: none; text-align: center;
        }

        .btn-row {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 500px;
            position: relative;
            gap: 20px;
        }

        .action-btn {
            min-width: 170px; padding: 10px 25px; border-radius: 30px;
            border: none; color: white; font-weight: bold; cursor: pointer;
            display: flex; flex-direction: column; align-items: center;
            background: linear-gradient(45deg, #5e00a3, #a251f1);
            transition: all 0.3s;
            z-index: 2;
        }
        .action-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px #a251f1; }

        .boom-trigger-btn {
            position: absolute;
            right: 0;
            min-width: 80px; 
            padding: 5px 12px; 
            border-radius: 20px;
            background: transparent;
            border: 1px solid rgba(255, 69, 0, 0.2);
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.65rem; 
            cursor: pointer;
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 4px;
            transition: all 0.3s;
        }
        .boom-trigger-btn:hover {
            border-color: #ff4500;
            background: rgba(255, 69, 0, 0.1);
            color: #fff;
        }

        .btn-en-main { font-size: 0.6rem; opacity: 0.8; text-transform: uppercase; }
        .btn-en-boom { font-size: 0.5rem; opacity: 0.6; text-transform: uppercase; margin-left: 2px; }

        .black-hole-stage {
            position: relative; width: 100%; height: 350px;
            display: flex; align-items: center; justify-content: center; z-index: 10;
        }

        .black-hole {
            width: var(--bh-size, 110px); height: var(--bh-size, 110px);
            background: #000; border-radius: 50%;
            box-shadow: 0 0 0 4px #000, 0 0 12px 3px rgba(255, 87, 34, 0.9), 
                        0 0 calc(var(--bh-size, 110px) * 0.3) calc(var(--bh-size, 110px) * 0.1) #5e00a3, 
                        0 0 calc(var(--bh-size, 110px) * 0.7) calc(var(--bh-size, 110px) * 0.3) rgba(255, 69, 0, 0.4);
            animation: distort 5s infinite linear;
            transition: all 0.4s ease-out;
        }

        .doom-text {
            position: absolute; font-size: 2.2rem; font-weight: 900;
            pointer-events: none; white-space: nowrap; z-index: 15; 
            animation: swallow 5.5s forwards cubic-bezier(0.25, 0.1, 0.25, 1); 
        }

        @keyframes swallow {
            0% { transform: translate(var(--start-x), var(--start-y)) rotate(var(--start-rot)) scale(1.2); opacity: 0; }
            12% { opacity: 1; }
            50% { transform: translate(calc(var(--start-x) * 0.35), calc(var(--start-y) * 0.35)) rotate(calc(var(--start-rot) + 720deg)) scale(1); opacity: 1; }
            85% { transform: translate(calc(var(--start-x) * 0.08), calc(var(--start-y) * 0.08)) rotate(calc(var(--start-rot) + 2160deg)) scale(0.6) skewX(20deg); opacity: 0.9; }
            100% { transform: translate(0, 0) rotate(calc(var(--start-rot) + 3600deg)) scale(0) skewX(45deg); opacity: 0; }
        }

        .particle {
            position: absolute; width: 6px; height: 6px; border-radius: 50%;
            pointer-events: none; z-index: 16; animation: particle-burst 0.9s forwards ease-out;
        }
        @keyframes particle-burst { 0% { transform: translate(0, 0) scale(1); opacity: 1; } 100% { transform: translate(var(--end-x), var(--end-y)) scale(0); opacity: 0; } }

        .level-up-text {
            position: absolute; color: #fff; font-size: 1.8rem; font-weight: bold;
            text-shadow: 0 0 20px #ff007f; text-align: center; animation: float-up 1.5s forwards ease-out; z-index: 50;
        }
        .level-up-text small { display: block; font-size: 0.8rem; opacity: 0.9; text-transform: uppercase; }

        @keyframes float-up { 0% { transform: translateY(0) scale(0.5); opacity: 0; } 20% { transform: translateY(-30px) scale(1.2); opacity: 1; } 100% { transform: translateY(-90px) scale(0.8); opacity: 0; } }

        .calm-portal {
            display: none; flex-direction: column; align-items: center;
            background: rgba(10, 10, 25, 0.9); border: 2px solid #ff007f;
            padding: 25px; border-radius: 25px; width: 100%; gap: 20px;
            backdrop-filter: blur(15px); animation: fadeIn 0.8s ease-out;
        }
        .calm-message { font-size: 1.1rem; color: #ffcc80; font-weight: bold; line-height: 1.6; text-shadow: 0 0 10px rgba(255, 204, 128, 0.4); }
        .calm-message small { display: block; font-size: 0.8rem; opacity: 0.9; margin-top: 5px; }

        .link-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; width: 100%; }
        .portal-link { padding: 12px; border-radius: 12px; background: rgba(255,255,255,0.05); color: #fff; text-decoration: none; font-size: 0.9rem; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .restart-btn { grid-column: span 2; padding: 12px; border-radius: 15px; background: linear-gradient(45deg, #00b4db, #0083b0); color: white; border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; }
        .restart-btn small { font-size: 0.7rem; opacity: 0.9; text-transform: uppercase; }

        .apply-shake { animation: screen-shake 0.3s both; }
        @keyframes screen-shake { 0% { transform: translate(0,0); } 25% { transform: translate(6px,6px); } 50% { transform: translate(-6px,-6px); } 100% { transform: translate(0,0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="shake-wrapper" id="screen">
        <div class="stats-panel">
            <div class="stat-item"><div class="cn-label">黑洞等級</div>LEVEL<span id="bh-level">LV. 1</span></div>
            <div class="stat-item"><div class="cn-label">已消滅</div>ABSORBED<span id="total-swallowed">0</span></div>
            <div class="stat-item"><div class="cn-label">碎屑</div>STARDUST<span id="total-particles">0</span></div>
        </div>

        <div class="container">
            <div id="normal-input-zone" style="width: 100%; text-align: center; display: flex; flex-direction: column; gap: 20px;">
                <h1>把一切煩惱，化為星塵徹底攪碎<small>Crush worries into cosmic stardust</small></h1>
                
                <div class="input-group">
                    <input type="text" id="trash-input" placeholder="輸入你想消除的東西... / Enter worries..." maxlength="20">
                    
                    <div class="btn-row">
                        <button id="burn-btn" class="action-btn">
                            <span>開始吞噬</span><span class="btn-en-main">Initiate Swallowing</span>
                        </button>
                        
                        <button id="boom-btn" class="boom-trigger-btn">
                            💥 負能量爆炸<span class="btn-en-boom">VOID BOOM</span>
                        </button>
                    </div>
                </div>
            </div>

            <div id="portal-zone" class="calm-portal">
                <div class="calm-message" id="calm-txt"></div>
                <div class="link-grid">
                    <a href="https://www.youtube.com" target="_blank" class="portal-link">YouTube 🎬</a>
                    <a href="https://music.youtube.com" target="_blank" class="portal-link">YT Music 🎵</a>
                    <a href="https://www.netflix.com" target="_blank" class="portal-link">Netflix 🍿</a>
                    <a href="https://www.kkbox.com" target="_blank" class="portal-link">KKBOX 🎧</a>
                    <button class="restart-btn" id="reset-btn"><span>讓宇宙重開機</span><small>REBOOT UNIVERSE</small></button>
                </div>
            </div>

            <div class="black-hole-stage"><div class="black-hole" id="bh-core"></div></div>
        </div>
    </div>

    <script>
        const input = document.getElementById('trash-input'), btn = document.getElementById('burn-btn'), boomBtn = document.getElementById('boom-btn');
        const stage = document.querySelector('.black-hole-stage'), screen = document.getElementById('screen'), blackHoleCore = document.getElementById('bh-core');
        const uiLevel = document.getElementById('bh-level'), uiSwallowed = document.getElementById('total-swallowed'), uiParticles = document.getElementById('total-particles');
        const inputZone = document.getElementById('normal-input-zone'), portalZone = document.getElementById('portal-zone'), calmTxt = document.getElementById('calm-txt'), resetBtn = document.getElementById('reset-btn');

        const calmPhrases = [
            "「引力載荷已達 100%！黑洞已經被你的煩惱餵到吐了...🤮」<small>Gravity Load 100%! The Black Hole is sick of your worries...</small>",
            "「黑洞表示：『嗝～今天吃了太多垃圾，需要休息一下。』🤫」<small>BH says: 'Burp~ Too much trash today. I need to digest.'</small>",
            "「爆炸了啦！現在是強迫休息時間，直接躺平吧！🛌」<small>Critical Overflow! It's mandatory rest time. Just lie down!</small>",
            "「黑洞臨界點已到！現在冷靜一下吧！🥲」<small>Event Horizon Reached! Go chill!</small>",
            "「快要爆炸了！黑洞表示消化不良...🤢」<small>Warning: Indigestion! The Black Hole is about to explode...</small>",
            "「負能量已全數攪碎，選個傳送門休息一下吧！🤪」<small>Negative energy crushed. Take a break!</small>"
        ];

        let countSwallowed = 0, countParticles = 0, currentLevel = 1, currentBhSize = 110;
        blackHoleCore.style.setProperty('--bh-size', `${currentBhSize}px`);

        function triggerScreenShake() { screen.classList.remove('apply-shake'); void screen.offsetWidth; screen.classList.add('apply-shake'); }
        function pulseBlackHole(scale, duration) { blackHoleCore.style.transform = `scale(${scale})`; setTimeout(() => { blackHoleCore.style.transform = 'scale(1)'; }, duration); }

        function checkLevelUp() {
            let targetLevel = Math.floor(countSwallowed / 5) + 1;
            if (targetLevel >= 25) {
                currentLevel = 25; currentBhSize = 250; blackHoleCore.style.setProperty('--bh-size', `250px`);
                uiLevel.innerText = `LV. 25 (MAX)`;
                setTimeout(() => { 
                    inputZone.style.display = 'none'; 
                    portalZone.style.display = 'flex'; 
                    calmTxt.innerHTML = calmPhrases[Math.floor(Math.random()*calmPhrases.length)]; 
                }, 800);
                return;
            }
            if (targetLevel > currentLevel) {
                currentLevel = targetLevel; currentBhSize += 6;
                blackHoleCore.style.setProperty('--bh-size', `${currentBhSize}px`);
                uiLevel.innerText = `LV. ${currentLevel}`;
                const lvText = document.createElement('div'); 
                lvText.className = 'level-up-text'; 
                lvText.innerHTML = `進化！LV.${currentLevel}<small>BH EVOLVED!</small>`; 
                stage.appendChild(lvText);
                lvText.addEventListener('animationend', () => lvText.remove());
            }
        }

        function createParticles(color, count = 40) {
            for (let i = 0; i < count; i++) {
                const p = document.createElement('div'); p.className = 'particle'; p.style.backgroundColor = color;
                const angle = Math.random() * Math.PI * 2, dist = 40 + Math.random() * (currentBhSize * 1.3);
                p.style.setProperty('--end-x', `${Math.cos(angle)*dist}px`); p.style.setProperty('--end-y', `${Math.sin(angle)*dist}px`);
                stage.appendChild(p); p.addEventListener('animationend', () => p.remove());
            }
        }

        function sendToBlackHole() {
            const text = input.value.trim();
            if (currentLevel >= 25 || !text) return;
            input.value = '';
            const node = document.createElement('div'); node.className = 'doom-text'; node.innerText = text;
            const color = `hsl(${Math.floor(Math.random()*360)}, 95%, 65%)`; node.style.color = color;
            const angle = Math.random()*Math.PI*2, dist = 220 + Math.random()*100;
            node.style.setProperty('--start-x', `${Math.cos(angle)*dist}px`); node.style.setProperty('--start-y', `${Math.sin(angle)*dist}px`);
            node.style.setProperty('--start-rot', `${(Math.random()-0.5)*360}deg`);
            stage.appendChild(node);
            node.addEventListener('animationend', () => {
                countSwallowed++; uiSwallowed.innerText = countSwallowed;
                countParticles += 40; uiParticles.innerText = countParticles;
                createParticles(color); triggerScreenShake(); pulseBlackHole(1.3, 100); checkLevelUp(); node.remove();
            });
        }

        boomBtn.addEventListener('click', () => {
            if (currentLevel >= 25) return;
            countSwallowed = 125; uiSwallowed.innerText = countSwallowed;
            countParticles += 800; uiParticles.innerText = countParticles;
            triggerScreenShake();
            pulseBlackHole(2.8, 600);
            createParticles('#ff4500', 250); 
            setTimeout(checkLevelUp, 300);
        });

        btn.addEventListener('click', sendToBlackHole);
        input.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendToBlackHole(); });
        resetBtn.addEventListener('click', () => { location.reload(); });
    </script>
</body>
</html>
