<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>心靈除噪器 | Soul Denoiser</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #05050a;
            color: #fff;
            font-family: 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            perspective: 2000px;
        }

        body::before {
            content: '';
            position: absolute; width: 100%; height: 100%;
            background-image: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px);
            background-size: 550px 550px; opacity: 0.15; z-index: 0;
        }

        .shake-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100%;
            /* ✨ 改用動態間距：電腦版較大，手機版會透過下方的 @media 自動縮小 */
            padding-top: 140px; 
        }

        .stats-panel {
            position: absolute;
            top: 20px;
            display: flex;
            gap: 15px;
            background: rgba(255, 255, 255, 0.08);
            padding: 10px 15px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .stat-item { text-align: center; font-size: 0.7rem; color: #888; text-transform: uppercase; }
        .stat-item .cn-label { display: block; color: #aaa; font-size: 0.8rem; }
        .stat-item span { display: block; font-size: 1.2rem; font-weight: bold; color: #a251f1; margin-top: 3px; }

        .container {
            position: relative;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 500px;
            padding: 0 20px;
        }

        h1 {
            font-size: 1.8rem;
            text-align: center;
            text-shadow: 0 0 15px rgba(255,255,255,0.7);
            line-height: 1.3;
        }

        h1 small {
            display: block; font-size: 0.9rem; font-weight: bold;
            color: rgba(255, 255, 255, 0.4); margin-top: 5px;
            text-transform: uppercase; letter-spacing: 1px;
        }

        .input-group { display: flex; flex-direction: column; width: 100%; gap: 12px; align-items: center; }

        input[type="text"] {
            width: 100%; padding: 12px 20px; border-radius: 30px;
            border: 1px solid #444; background: rgba(0, 0, 0, 0.6);
            color: white; font-size: 1rem; outline: none; text-align: center;
        }

        button.action-btn {
            min-width: 160px; padding: 10px 20px; border-radius: 25px;
            border: none; background: linear-gradient(45deg, #5e00a3, #a251f1);
            color: white; font-weight: bold; cursor: pointer;
            display: flex; flex-direction: column; align-items: center;
        }
        button.action-btn .cn-btn { font-size: 1rem; }
        button.action-btn .en-btn { font-size: 0.6rem; opacity: 0.8; }

        /* ✨ 核心修正：手機版專用 CSS 強制覆蓋 */
        @media (max-width: 600px) {
            .shake-wrapper { padding-top: 100px !important; }
            h1 { font-size: 1.4rem !important; }
            h1 small { font-size: 0.7rem !important; }
            .stats-panel { top: 15px; transform: scale(0.9); }
            .black-hole-stage { height: 280px !important; }
        }

        .black-hole-stage {
            position: relative; width: 100%; height: 350px;
            display: flex; align-items: center; justify-content: center; z-index: 10;
        }

        .black-hole {
            width: var(--bh-size, 110px); height: var(--bh-size, 110px);
            background: #000; border-radius: 50%;
            box-shadow: 0 0 0 4px #000, 0 0 12px 3px rgba(255, 87, 34, 0.9), 
                        0 0 calc(var(--bh-size, 110px) * 0.3) calc(var(--bh-size, 110px) * 0.1) #5e00a3, 
                        0 0 calc(var(--bh-size, 110px) * 0.7) calc(var(--bh-size, 110px) * 0.3) rgba(255, 69, 0, 0.4);
            animation: distort 5s infinite linear;
            transition: all 0.4s ease-out;
        }

        /* 其他原有動畫與 Portal 樣式維持不變... */
        .calm-portal {
            display: none; flex-direction: column; align-items: center;
            background: rgba(10, 10, 25, 0.95); border: 2px solid #ff007f;
            padding: 20px; border-radius: 20px; width: 100%; gap: 15px;
            backdrop-filter: blur(15px); animation: fadeIn 0.8s;
        }
        .link-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        .portal-link { padding: 12px; border-radius: 12px; background: rgba(255,255,255,0.05); color: #fff; text-decoration: none; font-size: 0.8rem; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .restart-btn { grid-column: span 2; padding: 12px; border-radius: 15px; background: linear-gradient(45deg, #00b4db, #0083b0); color: #fff; border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; }
        .cheat-btn { position: absolute; bottom: 10px; right: 10px; background: rgba(138,43,226,0.1); color: rgba(255,255,255,0.3); border: 1px dashed rgba(255,255,255,0.2); padding: 5px; font-size: 10px; cursor: pointer; }
        .doom-text { position: absolute; font-size: 2rem; font-weight: 900; pointer-events: none; animation: swallow 5.5s forwards; }
        .particle { position: absolute; width: 4px; height: 4px; border-radius: 50%; animation: particle-burst 0.8s forwards; }
        .level-up-text { position: absolute; color: #fff; font-size: 1.5rem; font-weight: bold; text-shadow: 0 0 10px #ff007f; text-align: center; animation: float-up 1.5s forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes distort { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes swallow { 
            0% { transform: translate(var(--start-x), var(--start-y)) scale(1.2); opacity: 0; }
            15% { opacity: 1; }
            100% { transform: translate(0,0) rotate(3600deg) scale(0); opacity: 0; }
        }
        @keyframes particle-burst { 0% { transform: translate(0,0); opacity: 1; } 100% { transform: translate(var(--end-x), var(--end-y)); opacity: 0; } }
        @keyframes float-up { 0% { transform: translateY(0); opacity: 0; } 100% { transform: translateY(-100px); opacity: 0; } }
        .apply-shake { animation: screen-shake 0.3s; }
        @keyframes screen-shake { 0% { transform: translate(0,0); } 25% { transform: translate(5px,5px); } 50% { transform: translate(-5px,-5px); } 100% { transform: translate(0,0); } }
    </style>
</head>
<body>

    <div class="shake-wrapper" id="screen">
        <div class="stats-panel">
            <div class="stat-item"><div class="cn-label">等級</div>LVL<span id="bh-level">LV. 1</span></div>
            <div class="stat-item"><div class="cn-label">已消滅</div>ABSORBED<span id="total-swallowed">0</span></div>
            <div class="stat-item"><div class="cn-label">碎屑</div>STARDUST<span id="total-particles">0</span></div>
        </div>

        <div class="container">
            <div id="normal-input-zone" style="width: 100%; display: flex; flex-direction: column; gap: 15px;">
                <h1>把一切煩惱，化為星塵徹底攪碎<small>Crush worries into cosmic stardust</small></h1>
                <div class="input-group">
                    <input type="text" id="trash-input" placeholder="輸入你想消除的東西 / Enter worries..." maxlength="20">
                    <button id="burn-btn" class="action-btn"><span class="cn-btn">開始吞噬</span><span class="en-btn">Initiate Swallowing</span></button>
                </div>
            </div>

            <div id="portal-zone" class="calm-portal">
                <div class="calm-message" id="calm-txt"></div>
                <div class="link-grid">
                    <a href="https://www.youtube.com" target="_blank" class="portal-link">YouTube 🎬</a>
                    <a href="https://music.youtube.com" target="_blank" class="portal-link">YT Music 🎵</a>
                    <a href="https://www.netflix.com" target="_blank" class="portal-link">Netflix 🍿</a>
                    <a href="https://www.kkbox.com" target="_blank" class="portal-link">KKBOX 🎧</a>
                    <button class="restart-btn" id="reset-btn"><span>讓宇宙重開機</span><small>REBOOT UNIVERSE</small></button>
                </div>
            </div>

            <div class="black-hole-stage"><div class="black-hole" id="bh-core"></div></div>
        </div>
    </div>

    <button class="cheat-btn" id="cheat-button">負能量注入<br>VOID ENERGY</button>

    <script>
        // JS 邏輯保持不變...
        const input = document.getElementById('trash-input');
        const btn = document.getElementById('burn-btn');
        const stage = document.querySelector('.black-hole-stage');
        const screen = document.getElementById('screen');
        const blackHoleCore = document.getElementById('bh-core');
        const uiLevel = document.getElementById('bh-level');
        const uiSwallowed = document.getElementById('total-swallowed');
        const uiParticles = document.getElementById('total-particles');
        const inputZone = document.getElementById('normal-input-zone');
        const portalZone = document.getElementById('portal-zone');
        const calmTxt = document.getElementById('calm-txt');
        const resetBtn = document.getElementById('reset-btn');
        const cheatBtn = document.getElementById('cheat-button');

        const calmPhrases = [
            "「引力載荷已達 100%！黑洞已經被你的煩惱餵到吐了...🤮」",
            "「黑洞表示：『嗝～今天吃了太多垃圾，需要休息一下。』🤫」",
            "「爆炸了啦！現在是強迫休息時間，直接躺平吧！🛌」",
            "「黑洞臨界點已到！丟夠多了，現在冷靜一下吧！🥲」",
            "「快要爆炸了！黑洞表示消化不良...🤢」",
            "「負能量已全數攪碎，選個傳送門休息一下吧！🤪」"
        ];

        let countSwallowed = 0, countParticles = 0, currentLevel = 1, currentBhSize = 110;
        blackHoleCore.style.setProperty('--bh-size', `${currentBhSize}px`);

        function triggerScreenShake() { screen.classList.remove('apply-shake'); void screen.offsetWidth; screen.classList.add('apply-shake'); }
        function pulseBlackHole(scale, duration) { blackHoleCore.style.transform = `scale(${scale})`; setTimeout(() => { blackHoleCore.style.transform = 'scale(1)'; }, duration); }

        function checkLevelUp() {
            let targetLevel = Math.floor(countSwallowed / 5) + 1;
            if (targetLevel >= 25) {
                currentLevel = 25; currentBhSize = 250; blackHoleCore.style.setProperty('--bh-size', `250px`);
                uiLevel.innerText = `LV. 25 (MAX)`;
                setTimeout(() => { inputZone.style.display = 'none'; portalZone.style.display = 'flex'; calmTxt.innerHTML = calmPhrases[Math.floor(Math.random()*6)]; }, 800);
                return;
            }
            if (targetLevel > currentLevel) {
                currentLevel = targetLevel; currentBhSize += 6;
                blackHoleCore.style.setProperty('--bh-size', `${currentBhSize}px`);
                uiLevel.innerText = `LV. ${currentLevel}`;
                const lvText = document.createElement('div'); lvText.className = 'level-up-text'; lvText.innerHTML = `進化！LV.${currentLevel}`; stage.appendChild(lvText);
                lvText.addEventListener('animationend', () => lvText.remove());
            }
        }

        function createParticles(color) {
            for (let i = 0; i < 30; i++) {
                const p = document.createElement('div'); p.className = 'particle'; p.style.backgroundColor = color;
                const angle = Math.random() * Math.PI * 2, dist = 40 + Math.random() * 150;
                p.style.setProperty('--end-x', `${Math.cos(angle)*dist}px`); p.style.setProperty('--end-y', `${Math.sin(angle)*dist}px`);
                stage.appendChild(p); p.addEventListener('animationend', () => p.remove());
            }
        }

        function sendToBlackHole() {
            if (currentLevel >= 25 || !input.value.trim()) return;
            const text = input.value.trim(); input.value = '';
            const node = document.createElement('div'); node.className = 'doom-text'; node.innerText = text;
            const color = `hsl(${Math.floor(Math.random()*360)}, 80%, 70%)`; node.style.color = color;
            const angle = Math.random()*Math.PI*2, dist = 200 + Math.random()*50;
            node.style.setProperty('--start-x', `${Math.cos(angle)*dist}px`); node.style.setProperty('--start-y', `${Math.sin(angle)*dist}px`);
            stage.appendChild(node);
            node.addEventListener('animationend', () => {
                countSwallowed++; uiSwallowed.innerText = countSwallowed;
                countParticles += 30; uiParticles.innerText = countParticles;
                createParticles(color); triggerScreenShake(); pulseBlackHole(1.3, 100); checkLevelUp(); node.remove();
            });
        }

        btn.addEventListener('click', sendToBlackHole);
        input.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendToBlackHole(); });
        cheatBtn.addEventListener('click', () => { countSwallowed += 25; checkLevelUp(); triggerScreenShake(); createParticles('#8a2be2'); });
        resetBtn.addEventListener('click', () => { location.reload(); });
    </script>
</body>
</html>
